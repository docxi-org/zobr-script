name: Deploy to VPS

on:
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      reset_db:
        description: 'Reset SQLite database (destructive!)'
        type: boolean
        default: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        run: pnpm --filter @zobr/web build

      - name: Build MCP Apps
        run: pnpm --filter @zobr/server build:apps

      - name: Deploy via rsync (staging)
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -avz --delete --exclude='node_modules' --exclude='.env' --exclude='data' --exclude='zs-lib/*.d.ts' --exclude='zs-lib/tsconfig*.json'
          path: ./
          remote_path: /opt/zobr-script-staging/
          remote_host: 80.74.31.205
          remote_user: root
          remote_key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Atomic swap and restart
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: 80.74.31.205
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            export NVM_DIR="/root/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"

            LIVE=/opt/zobr-script
            STAGING=/opt/zobr-script-staging
            OLD=/opt/zobr-script-old

            # Stop server before copying data (WAL safety)
            pm2 stop zobr-script || true

            # Carry over persistent state to staging
            [ -f "$LIVE/.env" ] && cp "$LIVE/.env" "$STAGING/.env"
            [ -d "$LIVE/data" ] && cp -a "$LIVE/data" "$STAGING/data"
            [ -d "$LIVE/node_modules" ] && cp -a "$LIVE/node_modules" "$STAGING/node_modules"

            # Install deps in staging
            cd "$STAGING"
            pnpm install --frozen-lockfile

            # Swap: live → old, staging → live
            rm -rf "$OLD"
            [ -d "$LIVE" ] && mv "$LIVE" "$OLD"
            mv "$STAGING" "$LIVE"

            cd "$LIVE"
            pm2 startOrReload ecosystem.config.cjs --update-env
            pm2 save

      - name: Init .env on first deploy
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: 80.74.31.205
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /opt/zobr-script
            if [ ! -f .env ]; then
              cat > .env << 'ENV'
            ZS_HOST=127.0.0.1
            ZS_PORT=1978
            ZS_LIBRARY=./zs-lib
            ZS_STORE_PATH=./data/store.sqlite
            ZS_BUDGET_STEPS=1000
            ZS_BUDGET_ITERATIONS=100
            ZS_INVOCATION_TTL=3600
            ZS_AWAITING_TTL=86400
            ZS_MAX_ACTIVE_INVOCATIONS=100
            ZS_JWT_SECRET=$(openssl rand -base64 32)
            ZS_ADMIN_PASSWORD=admin
            LOG_LEVEL=info
            ENV
              chmod 600 .env
              export NVM_DIR="/root/.nvm"
              [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
              pm2 startOrReload ecosystem.config.cjs --update-env
              pm2 save
            fi

      - name: Reset database
        if: inputs.reset_db == true
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: 80.74.31.205
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            export NVM_DIR="/root/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
            cd /opt/zobr-script
            pm2 stop zobr-script || true
            rm -f ./data/store.sqlite ./data/store.sqlite-wal ./data/store.sqlite-shm
            echo "Database reset — tables will be recreated on start"
            pm2 start zobr-script
            pm2 save

      - name: Health check
        run: |
          for i in 1 2 3 4 5 6 7 8; do
            sleep 5
            if curl -sf https://zs.docxi.org/health > /dev/null; then
              echo "Health check passed"
              exit 0
            fi
            echo "Attempt $i/8 failed, retrying..."
          done
          echo "Health check failed"
          exit 1

      - name: Cleanup old release
        if: success()
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: 80.74.31.205
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: rm -rf /opt/zobr-script-old
